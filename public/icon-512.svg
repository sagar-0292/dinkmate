  <line x1="212" y1="386" x2="256" y2="386" stroke="#6A4810" stroke-width="3" opacity="0.6"/>
  <line x1="212" y1="402" x2="256" y2="402" stroke="#6A4810" stroke-width="3" opacity="0.6"/>
  <line x1="212" y1="418" x2="256" y2="418" stroke="#6A4810" stroke-width="3" opacity="0.6"/>
  <!-- Ball -->
  <circle cx="342" cy="170" r="40" fill="#F5D98A" opacity="0.96"/>
  <circle cx="342" cy="170" r="40" fill="none" stroke="#B8872A" stroke-width="3"/>
  <!-- Ball holes pattern -->
  <circle cx="330" cy="160" r="3" fill="#B8872A" opacity="0.5"/>
