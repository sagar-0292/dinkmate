  <line x1="148" y1="192" x2="320" y2="192" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="142" y1="224" x2="326" y2="224" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="138" y1="256" x2="330" y2="256" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="140" y1="288" x2="328" y2="288" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="144" y1="320" x2="324" y2="320" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="200" y1="100" x2="200" y2="366" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="222" y1="96" x2="222" y2="370" stroke="#06060C" stroke-width="4" opacity="0.45"/>
  <line x1="246" y1="96" x2="246" y2="370" stroke="#06060C" stroke-width="4" opacity="0.45"/>
